org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Must match Flutter packJniLibs ABIs. If you only set ndk.abiFilters without this,
# libs.jar still contains x86_64 → ExtractJniTransform fails on AGP 8.11+.
# See Flutter Gradle: FlutterPluginUtils.getTargetPlatforms / packJniLibs task.
target-platform=android-arm,android-arm64
