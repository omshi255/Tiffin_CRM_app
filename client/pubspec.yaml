name: tiffin_crm
description: Tiffin CRM Flutter frontend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.0
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  google_maps_flutter: ^2.9.0
  lottie: ^3.3.2
  flutter_slidable: ^3.1.1
  url_launcher: ^6.2.5
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/