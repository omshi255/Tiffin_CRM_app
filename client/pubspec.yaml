name: tiffin_crm
description: Tiffin CRM Flutter frontend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.0.2
  fl_chart: ^1.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_map: 6.1.0
  latlong2: 0.9.0
  lottie: ^3.3.2
  flutter_slidable: ^4.0.3
  url_launcher: ^6.2.5
  flutter_contacts: ^1.1.9+2
  permission_handler: ^12.0.1
  dio: ^5.4.0
  socket_io_client: ^3.1.2
  pretty_dio_logger: ^1.3.1
  flutter_secure_storage: ^10.0.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  onesignal_flutter: ^5.2.5
  flutter_dotenv: ^5.2.1
  razorpay_flutter: ^1.3.6
  image_picker: ^1.0.7
  intl: ^0.20.2
  connectivity_plus: ^7.0.0
  phosphor_flutter: ^2.1.0
  web: ^1.0.0
  shared_preferences: ^2.5.4
  pdf: ^3.10.8
  printing: ^5.12.0
  flutter_map_cancellable_tile_provider: ^2.0.0
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - assets/config/onesignal.env