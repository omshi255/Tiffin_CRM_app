<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiffin CRM — Print-ready receipt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --primary: #7c3aed;
      --primary-dark: #6d28d9;
      --lavender: #f5f3ff;
      --lavender-border: #e9e3ff;
      --text: #1e1b4b;
      --text-muted: #64748b;
      --row-alt: #faf8ff;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", system-ui, sans-serif;
      background: #ede9fe;
      color: var(--text);
      padding: 24px 16px 48px;
    }

    .toolbar {
      max-width: 820px;
      margin: 0 auto 20px;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .btn-pdf {
      font-family: "Poppins", sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.35);
    }

    .btn-pdf:hover {
      background: var(--primary-dark);
    }

    .btn-pdf:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    /* ========== Receipt root (captured for PDF) ========== */
    #receipt-root {
      max-width: 794px; /* ~A4 width at 96dpi */
      margin: 0 auto;
      background: var(--white);
      padding: 28px 32px 36px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(30, 27, 75, 0.08);
      color-adjust: exact;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    #receipt-root * {
      color-adjust: exact;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .receipt-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--lavender-border);
    }

    .logo-placeholder {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--lavender) 0%, #ede9fe 100%);
      border: 2px solid var(--lavender-border);
      flex-shrink: 0;
    }

    .business-block {
      text-align: right;
      flex: 1;
    }

    .business-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }

    .business-meta {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0;
    }

    .receipt-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .receipt-meta strong {
      color: var(--text);
    }

    .generated-at {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .bill-to-card {
      background: var(--lavender);
      border: 1px solid var(--lavender-border);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 22px;
    }

    .bill-to-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--primary);
      margin: 0 0 10px;
    }

    .customer-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px;
    }

    .customer-line {
      font-size: 12px;
      color: var(--text-muted);
      margin: 0 0 4px;
      line-height: 1.45;
    }

    .customer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      margin-top: 10px;
      font-size: 11px;
    }

    .customer-grid span {
      color: var(--text-muted);
    }

    .customer-grid strong {
      color: var(--text);
      font-weight: 600;
    }

    .section-block {
      margin-bottom: 18px;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .section-title {
      background: var(--primary);
      color: #fff !important;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      padding: 10px 14px;
      margin: 0;
      border-radius: 8px 8px 0 0;
    }

    .items-table-wrap {
      border: 1px solid var(--lavender-border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
    }

    table.items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    table.items-table thead th {
      background: var(--primary) !important;
      color: #fff !important;
      font-weight: 700;
      text-align: left;
      padding: 10px 10px;
      border: 1px solid var(--primary-dark);
    }

    table.items-table thead th:nth-child(2),
    table.items-table thead th:nth-child(3),
    table.items-table thead th:nth-child(4),
    table.items-table thead th:nth-child(5) {
      text-align: right;
    }

    table.items-table tbody td {
      padding: 9px 10px;
      border: 1px solid #e2e8f0;
      vertical-align: middle;
    }

    table.items-table tbody tr:nth-child(even) td {
      background: var(--row-alt) !important;
    }

    table.items-table tbody tr:nth-child(odd) td {
      background: var(--white) !important;
    }

    table.items-table tbody td:nth-child(2),
    table.items-table tbody td:nth-child(3),
    table.items-table tbody td:nth-child(4),
    table.items-table tbody td:nth-child(5) {
      text-align: right;
    }

    .slot-subtotal-row td {
      font-weight: 700 !important;
      background: #f1f5f9 !important;
      border-top: 2px solid var(--lavender-border) !important;
    }

    .slot-subtotal-row td:first-child {
      text-align: right;
      padding-right: 12px;
    }

    .summary {
      margin-top: 20px;
      border-top: 2px solid var(--lavender-border);
      padding-top: 14px;
      font-size: 12px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
    }

    .summary-row.grand {
      font-weight: 800;
      font-size: 14px;
      color: var(--primary);
      border-top: 1px dashed var(--lavender-border);
      margin-top: 6px;
      padding-top: 10px;
    }

    /* Avoid breaking table across pages in print engine */
    .print-exact table,
    .print-exact .section-block,
    .print-exact .bill-to-card {
      break-inside: avoid;
      page-break-inside: avoid;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" class="btn-pdf" id="btn-download">Download PDF</button>
  </div>

  <div id="receipt-root" class="print-exact"></div>

  <script>
    /**
     * Receipt data — replace or inject from your app (same shape as React props).
     */
    const RECEIPT_DATA = {
      ownerName: "Anju’s Kitchen",
      phone: "+91 98765 43210",
      city: "Indore, MP",
      receiptNo: "R-2026-0312",
      date: "12/03/2026",
      customer: {
        name: "Anshu✨",
        phone: "9981390316",
        address: "123, Sample Street, Area",
        code: "C042",
        subscription: "Monthly Lunch",
        slot: "Lunch — 12:30 PM",
      },
      sections: [
        {
          title: "LUNCH",
          items: [
            { name: "Dal", qty: 1, unit: "plate", unitPrice: 40, total: 40 },
            { name: "Rice", qty: 1, unit: "plate", unitPrice: 35, total: 35 },
            { name: "Roti", qty: 4, unit: "pc", unitPrice: 10, total: 40 },
            { name: "Sabji", qty: 1, unit: "plate", unitPrice: 45, total: 45 },
            { name: "Salad", qty: 1, unit: "bowl", unitPrice: 15, total: 15 },
            { name: "Soup", qty: 1, unit: "bowl", unitPrice: 15, total: 15 },
          ],
        },
      ],
      subtotal: 190,
      tax: 0,
      grandTotal: 190,
      paid: 0,
      balanceDue: 190,
      runningBalance: 100,
    };

    const rupee = (n) =>
      "₹" +
      Number(n).toLocaleString("en-IN", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });

    function renderReceipt(data) {
      const root = document.getElementById("receipt-root");
      const now = new Date();
      const genTs = now.toLocaleString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });

      let sectionsHtml = "";
      data.sections.forEach((sec) => {
        const slotSub = sec.items.reduce((s, i) => s + Number(i.total || 0), 0);
        const rows = sec.items
          .map(
            (it) => `
          <tr>
            <td>${escapeHtml(it.name)}</td>
            <td>${escapeHtml(String(it.qty))}</td>
            <td>${escapeHtml(it.unit || "—")}</td>
            <td>${rupee(it.unitPrice)}</td>
            <td>${rupee(it.total)}</td>
          </tr>`
          )
          .join("");
        sectionsHtml += `
        <div class="section-block">
          <p class="section-title">${escapeHtml(sec.title)}</p>
          <div class="items-table-wrap">
            <table class="items-table">
              <thead>
                <tr>
                  <th>Item Name</th>
                  <th>Qty</th>
                  <th>Unit</th>
                  <th>Unit Price</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
                ${rows}
                <tr class="slot-subtotal-row">
                  <td colspan="5">Slot subtotal: ${rupee(slotSub)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>`;
      });

      root.innerHTML = `
        <header class="receipt-header">
          <div class="logo-placeholder" aria-hidden="true"></div>
          <div class="business-block">
            <h1 class="business-name">${escapeHtml(data.ownerName)}</h1>
            <p class="business-meta">${escapeHtml(data.phone)}<br/>${escapeHtml(data.city)}</p>
          </div>
        </header>
        <div class="receipt-meta">
          <div><strong>Receipt No.</strong> ${escapeHtml(data.receiptNo)}</div>
          <div style="text-align:right"><strong>Date</strong> ${escapeHtml(data.date)}</div>
        </div>
        <p class="generated-at">Generated: ${escapeHtml(genTs)}</p>

        <div class="bill-to-card">
          <p class="bill-to-label">BILL TO</p>
          <p class="customer-name">${escapeHtml(data.customer.name)}</p>
          <p class="customer-line">${escapeHtml(data.customer.phone)} | ${escapeHtml(data.customer.address)}</p>
          <div class="customer-grid">
            <div><span>Customer Code</span><br/><strong>${escapeHtml(data.customer.code || "—")}</strong></div>
            <div><span>Subscription</span><br/><strong>${escapeHtml(data.customer.subscription || "—")}</strong></div>
            <div style="grid-column: 1 / -1"><span>Delivery Slot</span><br/><strong>${escapeHtml(data.customer.slot || "—")}</strong></div>
          </div>
        </div>

        ${sectionsHtml}

        <div class="summary">
          <div class="summary-row"><span>Subtotal</span><span>${rupee(data.subtotal)}</span></div>
          <div class="summary-row"><span>Tax</span><span>${rupee(data.tax)}</span></div>
          <div class="summary-row grand"><span>Grand Total</span><span>${rupee(data.grandTotal)}</span></div>
          <div class="summary-row"><span>Paid</span><span>${rupee(data.paid)}</span></div>
          <div class="summary-row"><span>Balance Due</span><span>${rupee(data.balanceDue)}</span></div>
          <div class="summary-row"><span>Running balance</span><span>${rupee(data.runningBalance)}</span></div>
        </div>
      `;
    }

    function escapeHtml(s) {
      if (s == null) return "";
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    renderReceipt(RECEIPT_DATA);

    document.getElementById("btn-download").addEventListener("click", async function () {
      const el = document.getElementById("receipt-root");
      const btn = this;
      btn.disabled = true;
      const fileName = `Receipt-${(RECEIPT_DATA.receiptNo || "export").replace(/[^\w.-]+/g, "_")}.pdf`;

      const opt = {
        margin: [10, 10, 10, 10],
        filename: fileName,
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          logging: false,
          backgroundColor: "#ffffff",
        },
        jsPDF: {
          unit: "mm",
          format: "a4",
          orientation: "portrait",
        },
        pagebreak: { mode: ["avoid-all", "css", "legacy"] },
      };

      try {
        await html2pdf().set(opt).from(el).save();
      } catch (e) {
        console.error(e);
        alert("PDF export failed. Check console.");
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
